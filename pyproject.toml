[tool.uv.workspace]
members = [
    "packages/modbus-schema-common",
    "packages/modbus-common",
    "packages/modbus-config",
    "packages/modbus-schema-generator",
    "packages/modbus-simulator",
]

[tool.pytest.ini_options]
# Only collect tests from workspace packages — examples have their own
# dependencies not installed in the workspace venv.
testpaths = ["packages"]
addopts = "--cov=packages --cov-report=term-missing"

[tool.tox]
requires = ["tox-uv>=1"]
env_list = ["py38", "py39", "py310", "py311", "py312", "py313", "py314"]

[tool.tox.env_run_base]
# uv-venv-lock-runner: tox creates envs via uv and respects uv.lock (reproducible)
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
commands = [["pytest", "packages"]]

[dependency-groups]
dev = [
    "pytest>=7.4.4",
    "pytest-cov>=4.1.0",
]
