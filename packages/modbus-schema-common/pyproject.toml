[project]
name = "modbus-schema-common"
version = "1.0.0"
description = "Generic Modbus TCP register schema validation models and registry"
requires-python = ">=3.8"
dependencies = [
    "importlib-resources; python_version < '3.9'",
    "eval-type-backport; python_version < '3.10'",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
