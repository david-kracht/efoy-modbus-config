[project]
name = "modbus-simulator"
version = "0.1.0"
description = "Mock simulator server for Modbus schema environments"
requires-python = ">=3.11"
dependencies = [
    "modbus-schema-common>=0.1.0",
    "modbus-common>=0.1.0",
    "pymodbus>=3.6.8",
    "typer>=0.12.3",
]

[project.scripts]
modbus-sim = "modbus_simulator.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_simulator"]

[tool.uv.sources]
modbus-schema-common = { workspace = true }
modbus-common = { workspace = true }
