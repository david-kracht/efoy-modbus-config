[project]
name = "modbus-common"
version = "0.1.0"
description = "Common Modbus utilities (translator, aggregator, client wrapper)"
requires-python = ">=3.11"
dependencies = [
    "modbus-schema-common>=0.1.0",
    "pymodbus>=3.6.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_common"]

[tool.uv.sources]
modbus-schema-common = { workspace = true }
