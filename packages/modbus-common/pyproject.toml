[project]
name = "modbus-common"
version = "0.1.0"
description = "Common Modbus utilities (translator, aggregator, client wrapper)"
requires-python = ">=3.8"
dependencies = [
    "importlib-resources; python_version < '3.9'",
    "eval-type-backport; python_version < '3.10'",
    "modbus-schema-common",
    "pymodbus>=3.5.0",
    "pydantic>=2.0",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_common"]
include = ["src/modbus_common/resources/devices.yaml"]

[tool.uv.sources]
modbus-schema-common = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=7.4.4",
]
