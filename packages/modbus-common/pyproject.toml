[project]
name = "modbus-common"
version = "0.1.0"
description = "Common Modbus utilities (translator, aggregator, client wrapper)"
requires-python = ">=3.11"
dependencies = [
    "modbus-schema-common",
    "pymodbus>=3.8.0",
    "pydantic>=2.0",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_common"]
include = ["src/modbus_common/resources/devices.yaml"]

[tool.uv.sources]
modbus-schema-common = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.1.0",
]
