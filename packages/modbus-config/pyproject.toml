[project]
name = "modbus-config"
version = "1.1.0"
description = "EFOY Fuel Cell specific Modbus schemas"
requires-python = ">=3.11"
dependencies = [
    "modbus-schema-common",
]

[tool.uv.sources]
modbus-schema-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_config"]
artifacts = ["src/modbus_config/schemas/*.json"]
