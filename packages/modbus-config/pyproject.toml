[project]
name = "modbus-config"
version = "1.1.0"
description = "EFOY Fuel Cell specific Modbus schemas"
requires-python = ">=3.11"
dependencies = [
    "modbus-schema-common>=1.0.0",
]

[tool.uv.sources]
# === REGISTRY SWITCH ===
# Development: Sibling packages resolve locally from the workspace paths.
# Production Release: Comment out the lines in [tool.uv.sources] below to resolve published versions from PyPI registry.
modbus-schema-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modbus_config"]
artifacts = ["src/modbus_config/schemas/*.json"]
